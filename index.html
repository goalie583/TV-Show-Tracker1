<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Pulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-white p-6">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-cyan-400 rounded-3xl flex items-center justify-center text-5xl">📺</div>
                <h1 class="title-font text-4xl tracking-tighter">TV Pulse</h1>
            </div>
            <button onclick="checkForNewContent()" class="bg-cyan-400 text-black px-8 py-3 rounded-3xl font-semibold">🔄 Check Now</button>
        </header>

        <div class="flex gap-2 bg-zinc-900 p-1 rounded-3xl mb-10 w-fit">
            <button onclick="switchTab(0)" id="tab0" class="px-8 py-3 rounded-3xl data-[active=true]:bg-white data-[active=true]:text-black font-medium">Watchlist</button>
            <button onclick="switchTab(1)" id="tab1" class="px-8 py-3 rounded-3xl data-[active=true]:bg-white data-[active=true]:text-black font-medium">Search</button>
            <button onclick="switchTab(2)" id="tab2" class="px-8 py-3 rounded-3xl data-[active=true]:bg-white data-[active=true]:text-black font-medium">Upcoming</button>
            <button onclick="switchTab(3)" id="tab3" class="px-8 py-3 rounded-3xl data-[active=true]:bg-white data-[active=true]:text-black font-medium">Settings</button>
        </div>

        <!-- Watchlist -->
        <div id="content-0">
            <h2 class="text-3xl font-semibold mb-6">My Watchlist</h2>
            <div id="watchlist-grid" class="grid grid-cols-1 gap-4"></div>
            <p id="empty-watchlist" class="hidden text-center text-gray-400 py-12">Your watchlist is empty.<br>Search and add shows.</p>
        </div>

        <!-- Search -->
        <div id="content-1" class="hidden">
            <h2 class="text-3xl font-semibold mb-6">Search TV Shows</h2>
            <input id="search-input" type="text" placeholder="The Bear, House of the Dragon..." 
                   class="w-full p-5 bg-zinc-900 border border-white/20 rounded-3xl text-lg"
                   onkeydown="if(event.key==='Enter') searchShows()">
            <div id="search-results" class="mt-8 space-y-4"></div>
        </div>

        <!-- Upcoming -->
        <div id="content-2" class="hidden">
            <h2 class="text-3xl font-semibold mb-6">Upcoming Episodes</h2>
            <div id="upcoming-list" class="text-gray-400 py-12 text-center">No upcoming episodes yet</div>
        </div>

        <!-- Settings -->
        <div id="content-3" class="hidden">
            <h2 class="text-3xl font-semibold mb-8">Settings</h2>
            <div class="max-w-md bg-zinc-900 rounded-3xl p-8">
                <h3 class="font-medium mb-6">Reminder Timing</h3>
                <div class="flex justify-between mb-8">
                    <span>Enable reminders</span>
                    <input type="checkbox" id="reminder-toggle" checked class="w-11 h-6 accent-cyan-400">
                </div>
                <select id="reminder-preset" class="w-full bg-zinc-800 p-4 rounded-2xl">
                    <option value="3600000">1 hour before</option>
                    <option value="21600000">6 hours before</option>
                    <option value="86400000" selected>1 day before</option>
                    <option value="custom">Custom hours</option>
                </select>
                <div id="custom-group" class="hidden mt-6">
                    <input type="number" id="custom-hours" value="24" min="1" max="168" class="w-24 p-4 bg-zinc-800 rounded-2xl text-center">
                    <span class="ml-3">hours before</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = "https://api.tvmaze.com";
        let watchlist = [];

        function switchTab(n) {
            document.querySelectorAll('[id^="content-"]').forEach(el => el.classList.add('hidden'));
            document.getElementById(`content-${n}`).classList.remove('hidden');
            document.querySelectorAll('button[id^="tab"]').forEach(b => b.dataset.active = (b.id === `tab${n}`));
            if (n === 0) renderWatchlist();
        }

        function showToast(msg) {
            alert(msg);
        }

        async function searchShows() {
            const query = document.getElementById('search-input').value.trim();
            if (!query) return showToast("Please type a show name");

            const resultsDiv = document.getElementById('search-results');
            resultsDiv.innerHTML = "<p>Searching TVMaze...</p>";

            try {
                const res = await fetch(`https://api.tvmaze.com/search/shows?q=${encodeURIComponent(query)}`);
                const data = await res.json();

                resultsDiv.innerHTML = '';
                if (data.length === 0) {
                    resultsDiv.innerHTML = "<p>No shows found.</p>";
                    return;
                }

                data.forEach(item => {
                    const show = item.show;
                    const card = document.createElement('div');
                    card.className = "bg-zinc-900 p-6 rounded-3xl";
                    card.innerHTML = `
                        <div class="font-semibold">${show.name}</div>
                        <div class="text-sm text-gray-400">${show.network ? show.network.name : 'Streaming'}</div>
                        <button onclick="addToWatchlist(${show.id}, '${show.name.replace(/'/g, "\\'")}')" 
                                class="mt-6 w-full bg-cyan-400 text-black py-4 rounded-2xl font-medium">
                            Add to Watchlist
                        </button>
                    `;
                    resultsDiv.appendChild(card);
                });
            } catch (e) {
                resultsDiv.innerHTML = "<p>Search failed. Check your internet connection.</p>";
            }
        }

        function addToWatchlist(id, name) {
            if (watchlist.some(s => s.id === id)) return showToast("Already in watchlist");
            watchlist.push({ id, name });
            showToast(`✅ Added "${name}" to your watchlist`);
            renderWatchlist();
            switchTab(0);
        }

        function renderWatchlist() {
            const grid = document.getElementById('watchlist-grid');
            const empty = document.getElementById('empty-watchlist');
            grid.innerHTML = '';

            if (watchlist.length === 0) {
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');

            watchlist.forEach((show, i) => {
                const div = document.createElement('div');
                div.className = "bg-zinc-900 p-6 rounded-3xl flex justify-between";
                div.innerHTML = `
                    <span>${show.name}</span>
                    <button onclick="removeShow(${i})" class="text-red-400">Remove</button>
                `;
                grid.appendChild(div);
            });
        }

        function removeShow(i) {
            watchlist.splice(i, 1);
            renderWatchlist();
        }

        function checkForNewContent() {
            if (watchlist.length === 0) {
                return showToast("Add some shows to your watchlist first");
            }
            showToast("✅ Check Now clicked!\n\nOn real iOS this would check for new episodes and schedule reminders.");
        }

        // Start the app
        switchTab(0);
    </script>
</body>
</html>
</html>
