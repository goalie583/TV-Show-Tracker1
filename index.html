<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Pulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-6px); }
    </style>
</head>
<body class="bg-zinc-950 text-white p-6">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-12">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-gradient-to-br from-cyan-400 to-blue-500 rounded-3xl flex items-center justify-center text-6xl shadow-xl">📺</div>
                <div>
                    <h1 class="title-font text-5xl tracking-tighter">TV Pulse</h1>
                    <p class="text-cyan-400 text-sm">Track episodes & seasons</p>
                </div>
            </div>
            <button onclick="checkForNewContent()" 
                    class="bg-gradient-to-r from-cyan-400 to-blue-500 text-zinc-950 font-semibold px-10 py-4 rounded-3xl transition-all active:scale-95">
                🔄 Check Now
            </button>
        </header>

        <div class="flex gap-2 bg-zinc-900 p-1.5 rounded-3xl mb-12 w-fit shadow-inner">
            <button onclick="switchTab(0)" id="tab0" class="px-9 py-3.5 rounded-3xl data-[active=true]:bg-white data-[active=true]:text-zinc-950 font-medium transition-all">Watchlist</button>
            <button onclick="switchTab(1)" id="tab1" class="px-9 py-3.5 rounded-3xl data-[active=true]:bg-white data-[active=true]:text-zinc-950 font-medium transition-all">Search</button>
            <button onclick="switchTab(2)" id="tab2" class="px-9 py-3.5 rounded-3xl data-[active=true]:bg-white data-[active=true]:text-zinc-950 font-medium transition-all">Upcoming</button>
            <button onclick="switchTab(3)" id="tab3" class="px-9 py-3.5 rounded-3xl data-[active=true]:bg-white data-[active=true]:text-zinc-950 font-medium transition-all">Settings</button>
        </div>

        <!-- Watchlist -->
        <div id="content-0">
            <h2 class="text-3xl font-semibold mb-8">My Watchlist</h2>
            <div id="watchlist-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            <p id="empty-watchlist" class="hidden text-center text-gray-400 py-20 text-lg">Your watchlist is empty.<br>Search and add shows below.</p>
        </div>

        <!-- Search -->
        <div id="content-1" class="hidden">
            <h2 class="text-3xl font-semibold mb-8">Search TV Shows</h2>
            <div class="max-w-2xl">
                <input id="search-input" type="text" placeholder="The Bear, House of the Dragon..." 
                       class="w-full p-6 bg-zinc-900 border border-white/10 rounded-3xl text-lg focus:border-cyan-400 focus:outline-none"
                       onkeydown="if(event.key==='Enter') searchShows()">
                <button onclick="searchShows()" class="mt-6 bg-gradient-to-r from-cyan-400 to-blue-500 text-black px-12 py-4 rounded-3xl font-semibold">Search Shows</button>
            </div>
            <div id="search-results" class="mt-12 grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </div>

        <!-- Upcoming -->
        <div id="content-2" class="hidden">
            <h2 class="text-3xl font-semibold mb-8">Upcoming Episodes</h2>
            <div id="upcoming-list" class="text-gray-400 py-20 text-center text-lg">No upcoming episodes yet</div>
        </div>

        <!-- Settings -->
        <div id="content-3" class="hidden">
            <h2 class="text-3xl font-semibold mb-8">Settings</h2>
            <div class="max-w-md bg-zinc-900 rounded-3xl p-10">
                <h3 class="font-medium mb-8 text-xl">Reminder Timing</h3>
                <div class="flex justify-between mb-10">
                    <span class="text-lg">Enable reminders</span>
                    <input type="checkbox" id="reminder-toggle" checked class="w-12 h-7 accent-cyan-400">
                </div>
                <select id="reminder-preset" class="w-full bg-zinc-800 p-5 rounded-3xl text-lg mb-8">
                    <option value="3600000">1 hour before</option>
                    <option value="21600000">6 hours before</option>
                    <option value="86400000" selected>1 day before</option>
                    <option value="custom">Custom hours</option>
                </select>
                <div id="custom-group" class="hidden">
                    <div class="flex items-center gap-4">
                        <input type="number" id="custom-hours" value="24" min="1" max="168" class="w-28 p-5 bg-zinc-800 rounded-3xl text-center text-lg">
                        <span class="text-lg">hours before</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = "https://api.tvmaze.com";
        let watchlist = [];

        function switchTab(n) {
            document.querySelectorAll('[id^="content-"]').forEach(el => el.classList.add('hidden'));
            document.getElementById(`content-${n}`).classList.remove('hidden');
            document.querySelectorAll('button[id^="tab"]').forEach(b => b.dataset.active = (b.id === `tab${n}`));
            if (n === 0) renderWatchlist();
        }

        function showToast(msg) {
            alert(msg);
        }

        async function searchShows() {
            const query = document.getElementById('search-input').value.trim();
            if (!query) return showToast("Please type a show name");

            const resultsDiv = document.getElementById('search-results');
            resultsDiv.innerHTML = "<p class='text-gray-400 text-center py-8'>Searching TVMaze...</p>";

            try {
                const res = await fetch(`https://api.tvmaze.com/search/shows?q=${encodeURIComponent(query)}`);
                const data = await res.json();

                resultsDiv.innerHTML = '';
                data.forEach(item => {
                    const show = item.show;
                    const card = document.createElement('div');
                    card.className = "card bg-zinc-900 p-8 rounded-3xl border border-white/10";
                    card.innerHTML = `
                        <div class="font-semibold text-xl">${show.name}</div>
                        <div class="text-sm text-gray-400 mt-3">${show.network ? show.network.name : show.webChannel ? show.webChannel.name : 'Streaming'}</div>
                        <button onclick="addToWatchlist(${show.id}, '${show.name.replace(/'/g, "\\'")}')" 
                                class="mt-10 w-full bg-gradient-to-r from-cyan-400 to-blue-500 text-black py-4 rounded-3xl font-semibold hover:from-cyan-300 hover:to-blue-400 transition-all">
                            Add to Watchlist
                        </button>
                    `;
                    resultsDiv.appendChild(card);
                });
            } catch (e) {
                resultsDiv.innerHTML = "<p class='text-red-400 text-center py-8'>Search failed. Check your internet.</p>";
            }
        }

        async function addToWatchlist(id, name) {
            if (watchlist.some(s => s.id === id)) return showToast("Already in watchlist");

            let nextEpisode = null;
            try {
                const epsRes = await fetch(`https://api.tvmaze.com/shows/${id}/episodes`);
                const episodes = await epsRes.json();
                const now = Date.now();
                nextEpisode = episodes
                    .filter(e => e.airstamp && new Date(e.airstamp) > now)
                    .sort((a, b) => new Date(a.airstamp) - new Date(b.airstamp))[0];
            } catch (e) {
                console.log("Could not load next episode for", name);
            }

            watchlist.push({ 
                id, 
                name, 
                nextEpisode,
                lastChecked: Date.now()
            });

            showToast(`✅ Added "${name}" to your watchlist`);
            renderWatchlist();
            switchTab(0);
        }

        function renderWatchlist() {
            const grid = document.getElementById('watchlist-grid');
            const empty = document.getElementById('empty-watchlist');
            grid.innerHTML = '';

            if (watchlist.length === 0) {
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');

            watchlist.forEach((show, i) => {
                let nextText = "No upcoming episode announced";
                if (show.nextEpisode) {
                    const date = new Date(show.nextEpisode.airstamp);
                    nextText = `Next: S${show.nextEpisode.season}E${show.nextEpisode.number} — ${date.toLocaleDateString('en-US', {month:'short', day:'numeric'})}`;
                }
                const div = document.createElement('div');
                div.className = "card bg-zinc-900 p-8 rounded-3xl border border-white/10";
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="font-semibold text-xl">${show.name}</div>
                            <div class="text-sm text-cyan-400 mt-4">${nextText}</div>
                        </div>
                        <button onclick="removeShow(${i})" class="text-red-400 hover:text-red-500">Remove</button>
                    </div>
                `;
                grid.appendChild(div);
            });
        }

        function removeShow(i) {
            watchlist.splice(i, 1);
            renderWatchlist();
        }

        async function checkForNewContent() {
            if (watchlist.length === 0) {
                return showToast("Add some shows to your watchlist first");
            }
            showToast("✅ Checking for new episodes...");

            for (let show of watchlist) {
                try {
                    const epsRes = await fetch(`https://api.tvmaze.com/shows/${show.id}/episodes`);
                    const episodes = await epsRes.json();
                    const now = Date.now();
                    show.nextEpisode = episodes
                        .filter(e => e.airstamp && new Date(e.airstamp) > now)
                        .sort((a, b) => new Date(a.airstamp) - new Date(b.airstamp))[0];
                } catch (e) {}
            }
            renderWatchlist();
            showToast("Watchlist updated with latest episode info.");
        }

        // Start
        switchTab(0);
    </script>
</body>
</html>
